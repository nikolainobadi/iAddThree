name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test :

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Select Xcode
      run: sudo xcode-select -switch /Applications/Xcode_13.4.1.app

    - name: Build and test
      run: xcodebuild clean build test -project iAddThree/iAddThree.xcodeproj -scheme iAddThree -destination "platform=iOS Simulator, OS=16.0, name=iPhone 13" ONLY_ACTIVE_ARCH=NO CODE_SIGNING_REQUIRED=NO
