name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test :

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build and test
      run: xcodebuild clean build test -project iAddThree.xcodeproj -scheme iAddThree -destination "platform:iOS Simulator, id:05764A55-5F60-4F12-AF80-5F0188C2C857, OS:15.5, name:iPhone 13" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
